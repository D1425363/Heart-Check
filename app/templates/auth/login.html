{% extends "base.html" %}

{% block title %}會員登入 - Heart Check{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center my-4 animate-fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="card premium-card p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <span class="fs-1 text-primary"><i class="fa-solid fa-heart-pulse text-danger"></i></span>
                    <h2 class="header-title mt-2 mb-1">登入系統</h2>
                    <p class="text-muted">登入以累積人氣或發送感謝</p>
                </div>
                <form action="{{ url_for('auth.login') }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="username" class="form-label font-semibold">登入帳號</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="請輸入學號或自訂帳號" value="{{ username or '' }}" required autocomplete="off">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label font-semibold">登入密碼</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="請輸入密碼" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-premium w-100 py-2">
                        <i class="fa-solid fa-sign-in-alt me-2"></i>登入
                    </button>
                </form>
                <div class="text-center mt-4 text-muted small">
                    尚未註冊？<a href="{{ url_for('auth.register') }}" class="text-decoration-none font-bold text-danger">立即註冊帳號</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
