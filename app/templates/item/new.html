{% extends "base.html" %}

{% block title %}發布失物招領公告 - Heart Check{% endblock %}

{% block content %}
<div class="row justify-content-center animate-fade-in">
    <div class="col-md-9 col-lg-8">
        <div class="glass-panel">
            <h2 class="mb-1" style="font-family: var(--font-heading);">📢 發布失物招領公告</h2>
            <p class="text-secondary small mb-4">填寫詳細資訊，讓失物可以更快被尋回！</p>
            
            <form action="{{ url_for('item.new_item') }}" method="POST" enctype="multipart/form-data">
                
                <div class="row">
                    <!-- Title -->
                    <div class="col-md-8 form-group-custom">
                        <label for="title" class="form-label-custom">物品名稱 <span class="text-danger">*</span></label>
                        <input type="text" id="title" name="title" class="form-control-custom" placeholder="請輸入簡短物品標題（例如：在學餐撿到藍色皮夾）" required>
                    </div>

                    <!-- Type -->
                    <div class="col-md-4 form-group-custom">
                        <label for="item_type" class="form-label-custom">公告類型 <span class="text-danger">*</span></label>
                        <select id="item_type" name="item_type" class="form-select form-control-custom" required>
                            <option value="lost">遺失尋物 (Lost)</option>
                            <option value="found">撿到拾獲 (Found)</option>
                        </select>
                    </div>
                </div>

                <!-- Location -->
                <div class="form-group-custom">
                    <label for="location" class="form-label-custom">遺失或拾獲地點 <span class="text-danger">*</span></label>
                    <input type="text" id="location" name="location" class="form-control-custom" placeholder="例如：行政大樓二樓、綜合體育館重訓室、第二女生宿舍大門口" required>
                </div>

                <!-- Description -->
                <div class="form-group-custom">
                    <label for="description" class="form-label-custom">詳細特徵描述 <span class="text-danger">*</span></label>
                    <textarea id="description" name="description" class="form-control-custom" rows="6" placeholder="請詳細說明物品特徵（如：顏色、廠牌、內容物、刮痕或特殊吊飾），以利物主認領辨識..." required></textarea>
                </div>

                <!-- Contact Info -->
                <div class="form-group-custom">
                    <label for="contact_info" class="form-label-custom">聯絡方式 (選填)</label>
                    <input type="text" id="contact_info" name="contact_info" class="form-control-custom" placeholder="例如：Line ID: user123、手機: 0912-345-678 (不留則以系統個人檔案為主)">
                </div>

                <!-- File upload -->
                <div class="form-group-custom">
                    <label for="image" class="form-label-custom">上傳物品相片 (選填)</label>
                    <input type="file" id="image" name="image" class="form-control form-control-custom" accept="image/*">
                    <div class="form-text text-secondary mt-1">支援 PNG, JPG, JPEG, GIF, WEBP，大小限制 16MB 內</div>
                </div>

                <!-- Buttons -->
                <div class="row g-3 mt-4">
                    <div class="col-6 col-md-3">
                        <a href="{{ url_for('item.list_items') }}" class="btn-secondary-custom w-100 py-2.5 text-center">取消</a>
                    </div>
                    <div class="col-6 col-md-4 ms-auto">
                        <button type="submit" class="btn-premium w-100 py-2.5">
                            <i class="bi bi-send-fill"></i> 發布公告
                        </button>
                    </div>
                </div>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
