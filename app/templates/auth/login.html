{% extends "base.html" %}

{% block title %}登入帳戶 - Heart Check{% endblock %}

{% block content %}
<div class="row justify-content-center my-5 animate-fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="glass-panel">
            <div class="text-center mb-4">
                <h2 class="mb-1" style="font-family: var(--font-heading);">登入 Heart Check</h2>
                <p class="text-secondary small">歡迎回來！請輸入您的帳號密碼</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="form-group-custom">
                    <label for="username" class="form-label-custom">登入帳號</label>
                    <input type="text" id="username" name="username" class="form-control-custom" placeholder="請輸入帳號" required value="{{ request.form.get('username', '') }}">
                </div>

                <div class="form-group-custom">
                    <label for="password" class="form-label-custom">登入密碼</label>
                    <input type="password" id="password" name="password" class="form-control-custom" placeholder="請輸入密碼" required>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn-premium py-2.5">
                        <i class="bi bi-box-arrow-in-right"></i> 登入系統
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4 text-secondary small">
                還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" class="fw-semibold">立即註冊</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
